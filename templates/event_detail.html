{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ event.title }} — SPI Platform</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}());</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <a href="/" class="logo">
    <img class="logo-icon" src="{% static 'img/logo.png' %}" alt="SPI Platform">
  </a>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Поиск событий...">
    <button class="filter-btn" title="Фильтры">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6"  x2="20" y2="6"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="10" y1="18" x2="14" y2="18"/>
      </svg>
    </button>
  </div>
  <button class="theme-btn" id="themeToggle" title="Переключить тему">🌙</button>
  <button class="account-btn" title="Аккаунт">Акк</button>
</header>

<!-- ── Event Detail ────────────────────────────────────── -->
<div class="detail-wrap">
  <div class="detail-card">

    <div class="detail-image">{{ event.emoji }}</div>

    <div class="detail-body">
      <h1 class="detail-title">{{ event.title }}</h1>

      <div class="detail-meta">
        <div class="detail-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {{ event.date }}
        </div>
        <div class="detail-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          {{ event.location }}
        </div>
        <div class="detail-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          {{ event.org }}
        </div>
      </div>

      <p class="detail-desc">{{ event.desc }}</p>

      <div class="detail-actions">
        <a href="/" class="btn-back">← Назад к событиям</a>
        <a href="/organizer/{{ event.id }}/" class="btn-organizer">🏢 Страница организатора</a>
        <a href="#" class="btn-register">Зарегистрироваться</a>
      </div>
    </div>

  </div>
</div>

<script src="{% static 'js/carousel.js' %}"></script>
</body>
</html>
