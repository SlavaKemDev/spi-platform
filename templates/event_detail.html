{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ event.title }} — UniSphere</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}());</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <a href="/" class="logo">
    <img class="logo-icon" src="{% static 'img/logo.png' %}" alt="UniSphere">
  </a>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Поиск событий...">
    <button class="filter-btn" title="Фильтры">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6"  x2="20" y2="6"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="10" y1="18" x2="14" y2="18"/>
      </svg>
    </button>
  </div>
  <button class="theme-btn" id="themeToggle" title="Переключить тему">🌙</button>
  <a href="/auth/" class="account-btn" title="Войти" id="accountBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></a>
</header>

<!-- ── Event Detail ────────────────────────────────────── -->
<div class="detail-wrap">
  <div class="detail-card">

    <div class="detail-image">{{ event.emoji }}</div>

    <div class="detail-body">
      <h1 class="detail-title">{{ event.title }}</h1>

      <div class="detail-meta">
        <div class="detail-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {{ event.date }}
        </div>
        <div class="detail-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          {{ event.location }}
        </div>
        <div class="detail-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          {{ event.org }}
        </div>
      </div>

      <div class="detail-tags">
        {% if event.format == "online" %}
          <span class="card-tag card-tag-online">Онлайн</span>
        {% elif event.format == "offline" %}
          <span class="card-tag card-tag-offline">Оффлайн</span>
        {% endif %}
        <span id="eventStatusTag" style="display:none"></span>
      </div>

      <p class="detail-desc">{{ event.desc }}</p>

      <div class="detail-actions">
        <a href="/" class="btn-back">← Назад к событиям</a>
        <a href="/organizer/{{ event.id }}/" class="btn-organizer">🏢 {{ event.org }}</a>
        <button class="btn-register" id="registerBtn">Зарегистрироваться</button>
      </div>
      <p id="registerMsg" style="margin-top:10px;font-size:.88rem;display:none"></p>
    </div>

  </div>
</div>

<script src="{% static 'js/carousel.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script>
(function () {
  var EVENT_ID = {{ event.id }};

  var btn = document.getElementById('registerBtn');
  var msg = document.getElementById('registerMsg');

  var STATUS_LABELS = {
    upcoming:            { text: 'Скоро',                cls: 'card-tag-open'    },
    registration_open:   { text: 'Регистрация открыта',  cls: 'card-tag-open'    },
    registration_closed: { text: 'Регистрация закрыта',  cls: 'card-tag-offline' },
    ongoing:             { text: 'Идёт сейчас',          cls: 'card-tag-online'  },
    past:                { text: 'Завершено',             cls: ''                 },
  };

  var REG_STATUS = { pending: 'На рассмотрении', approved: 'Подтверждён', rejected: 'Отклонён' };

  function showMsg(text, ok) {
    msg.textContent = text;
    msg.style.color = ok ? '#16a34a' : '#b91c1c';
    msg.style.display = 'block';
  }

  function checkRegistration() {
    fetch('/api/events/' + EVENT_ID)
      .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function (data) {
        /* Status tag */
        if (data.status && STATUS_LABELS[data.status]) {
          var s = STATUS_LABELS[data.status];
          var tag = document.getElementById('eventStatusTag');
          tag.textContent = s.text;
          tag.className = 'card-tag ' + s.cls;
          tag.style.display = 'inline-block';
        }

        /* Disable register btn if not open */
        if (data.status === 'past') {
          btn.disabled = true; btn.textContent = 'Событие завершено';
        } else if (data.status === 'registration_closed') {
          btn.disabled = true; btn.textContent = 'Регистрация закрыта';
        } else if (data.status === 'upcoming') {
          btn.disabled = true; btn.textContent = 'Регистрация не открыта';
        }

        /* Already registered */
        if (data.my_registration) {
          btn.disabled = true;
          btn.textContent = 'Вы зарегистрированы';
          showMsg('Статус: ' + (REG_STATUS[data.my_registration.status] || data.my_registration.status), true);
        }
      })
      .catch(function () { /* не авторизован — кнопка остаётся */ });
  }

  btn.addEventListener('click', function () {
    var user = UniSphereAuth.getUser();
    if (!user) {
      window.location.href = '/auth/?next=/events/' + EVENT_ID + '/';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Регистрация...';

    UniSphereAuth.post('/api/events/' + EVENT_ID + '/register', { form_answer: {} })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
      .then(function (res) {
        if (res.ok || res.data.registration_id) {
          btn.textContent = 'Вы зарегистрированы';
          showMsg('Регистрация прошла успешно!', true);
        } else {
          btn.disabled = false;
          btn.textContent = 'Зарегистрироваться';
          showMsg(res.data.error || 'Не удалось зарегистрироваться.', false);
        }
      })
      .catch(function () {
        btn.disabled = false;
        btn.textContent = 'Зарегистрироваться';
        showMsg('Ошибка соединения. Попробуйте позже.', false);
      });
  });

  document.addEventListener('DOMContentLoaded', checkRegistration);
}());
</script>
</body>
</html>
