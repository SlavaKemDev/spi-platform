{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniSphere — Вход</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}());</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    .auth-page-wrap {
      min-height: calc(100vh - 65px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 20px 48px;
    }

    .auth-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px 32px 24px;
      width: 100%;
      max-width: 400px;
      transition: background .25s, border-color .25s;
    }

    /* ── Tab switcher ─────────────────────────── */
    .auth-tabs {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .auth-tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      transition: background .2s, color .2s;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .auth-tab:not(.active):hover { background: var(--accent-l); color: var(--accent); }

    /* ── Form sections ────────────────────────── */
    .auth-section { display: none; }
    .auth-section.active { display: block; }

    .auth-form { display: flex; flex-direction: column; gap: 11px; }
    .auth-field { display: flex; flex-direction: column; gap: 4px; }
    .auth-label { font-size: .82rem; color: var(--text); font-weight: 500; }

    .auth-input {
      height: 38px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: .9rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, background .25s, color .25s;
      font-family: inherit;
      width: 100%;
      box-sizing: border-box;
    }
    .auth-input:focus { border-color: var(--accent); background: var(--card-bg); }

    .auth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .auth-btn {
      margin-top: 6px;
      height: 40px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s;
      font-family: inherit;
    }
    .auth-btn:hover { background: #0d6b8a; transform: translateY(-1px); }
    .auth-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── Messages ─────────────────────────────── */
    .auth-msg {
      border-radius: 8px;
      padding: 9px 13px;
      font-size: .85rem;
      display: none;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .auth-msg.error   { background: #fee2e2; color: #b91c1c; }
    .auth-msg.success { background: #d1fae5; color: #065f46; }
    [data-theme="dark"] .auth-msg.error   { background: #3f0f0f; color: #f87171; }
    [data-theme="dark"] .auth-msg.success { background: #052e16; color: #34d399; }

    .auth-hint {
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
      margin-top: 10px;
    }
    .auth-hint a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
    }
    .auth-hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <a href="/" class="logo">
    <img class="logo-icon" src="{% static 'img/logo.png' %}" alt="UniSphere">
  </a>
  <div class="search-wrap"></div>
  <button class="theme-btn" id="themeToggle" title="Переключить тему">🌙</button>
</header>

<!-- ── Auth card ──────────────────────────────────────── -->
<div class="auth-page-wrap">
  <div class="auth-card">

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Войти</button>
      <button class="auth-tab" id="tabRegister">Регистрация</button>
    </div>

    <!-- ── LOGIN ─────────────────────────────── -->
    <div class="auth-section active" id="loginSection">
      <div class="auth-msg" id="loginMsg"></div>
      <form class="auth-form" id="loginForm" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="loginEmail">Email</label>
          <input class="auth-input" type="email" id="loginEmail" name="email"
                 required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="loginPassword">Пароль</label>
          <input class="auth-input" type="password" id="loginPassword" name="password"
                 required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="auth-btn" type="submit" id="loginBtn">Войти</button>
      </form>
      <p class="auth-hint">Нет аккаунта? <a id="loginToRegister">Зарегистрироваться</a></p>
    </div>

    <!-- ── REGISTER ──────────────────────────── -->
    <div class="auth-section" id="registerSection">
      <div class="auth-msg" id="registerMsg"></div>
      <form class="auth-form" id="registerForm" novalidate>
        <div class="auth-row">
          <div class="auth-field">
            <label class="auth-label" for="regLastName">Фамилия *</label>
            <input class="auth-input" type="text" id="regLastName" name="last_name"
                   required autocomplete="family-name" placeholder="Иванов">
          </div>
          <div class="auth-field">
            <label class="auth-label" for="regFirstName">Имя *</label>
            <input class="auth-input" type="text" id="regFirstName" name="first_name"
                   required autocomplete="given-name" placeholder="Иван">
          </div>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="regPatronymic">Отчество *</label>
          <input class="auth-input" type="text" id="regPatronymic" name="patronymic"
                 required autocomplete="additional-name" placeholder="Иванович">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="regBirthDate">Дата рождения *</label>
          <input class="auth-input" type="date" id="regBirthDate" name="birth_date" required>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="regEmail">Email *</label>
          <input class="auth-input" type="email" id="regEmail" name="email"
                 required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="regPassword">Пароль *</label>
          <input class="auth-input" type="password" id="regPassword" name="password"
                 required autocomplete="new-password" placeholder="Минимум 6 символов">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="regConfirm">Подтверждение пароля *</label>
          <input class="auth-input" type="password" id="regConfirm" name="password_confirm"
                 required autocomplete="new-password" placeholder="Повторите пароль">
        </div>
        <button class="auth-btn" type="submit" id="registerBtn">Создать аккаунт</button>
      </form>
      <p class="auth-hint">Уже есть аккаунт? <a id="registerToLogin">Войти</a></p>
    </div>

  </div>
</div>

<script>
(function () {

  /* ── Theme ──────────────────────────────────────────── */
  var themeBtn = document.getElementById('themeToggle');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', t);
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  themeBtn.addEventListener('click', function () {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ── Redirect if already authenticated ─────────────── */
  fetch('/api/users/me')
    .then(function (r) { return r.json(); })
    .then(function (d) { if (d && d.id) { window.location.replace('/profile/'); } })
    .catch(function () {});

  /* ── Tab switching ──────────────────────────────────── */
  var loginSection    = document.getElementById('loginSection');
  var registerSection = document.getElementById('registerSection');
  var tabLogin        = document.getElementById('tabLogin');
  var tabRegister     = document.getElementById('tabRegister');

  function showTab(tab) {
    var isLogin = tab === 'login';
    loginSection.classList.toggle('active', isLogin);
    registerSection.classList.toggle('active', !isLogin);
    tabLogin.classList.toggle('active', isLogin);
    tabRegister.classList.toggle('active', !isLogin);
    clearMsg('loginMsg');
    clearMsg('registerMsg');
  }

  tabLogin.addEventListener('click',    function () { showTab('login'); });
  tabRegister.addEventListener('click', function () { showTab('register'); });
  document.getElementById('loginToRegister').addEventListener('click',  function () { showTab('register'); });
  document.getElementById('registerToLogin').addEventListener('click',  function () { showTab('login'); });

  if (window.location.hash === '#register') { showTab('register'); }

  /* ── Message helpers ────────────────────────────────── */
  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'auth-msg ' + (type || 'error');
    el.style.display = 'block';
  }
  function clearMsg(id) {
    var el = document.getElementById(id);
    el.style.display = 'none';
    el.textContent = '';
  }
  function parseError(data, status) {
    if (data && data.error)  return data.error;
    if (data && data.detail) {
      if (Array.isArray(data.detail)) return data.detail.map(function (e) { return e.msg; }).join('; ');
      return data.detail;
    }
    return 'Ошибка ' + (status || '');
  }

  /* ── LOGIN ──────────────────────────────────────────── */
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearMsg('loginMsg');

    var email = document.getElementById('loginEmail').value.trim();
    var pass  = document.getElementById('loginPassword').value;

    if (!email || !pass) { showMsg('loginMsg', 'Введите email и пароль.'); return; }

    var btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Вход...';

    try {
      var res  = await fetch('/api/users/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: email, password: pass }),
      });
      var data = await res.json();

      if (res.status === 404) {
        showMsg('loginMsg', 'Пользователь с таким email не найден.');
      } else if (data.success) {
        showMsg('loginMsg', 'Вы вошли! Перенаправляем...', 'success');
        setTimeout(function () { window.location.href = '/profile/'; }, 600);
      } else {
        showMsg('loginMsg', parseError(data, res.status));
      }
    } catch (_) {
      showMsg('loginMsg', 'Ошибка соединения с сервером. Попробуйте позже.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  });

  /* ── REGISTER ───────────────────────────────────────── */
  document.getElementById('registerForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearMsg('registerMsg');

    var lastName   = document.getElementById('regLastName').value.trim();
    var firstName  = document.getElementById('regFirstName').value.trim();
    var patronymic = document.getElementById('regPatronymic').value.trim();
    var birthDate  = document.getElementById('regBirthDate').value;
    var email      = document.getElementById('regEmail').value.trim();
    var pass       = document.getElementById('regPassword').value;
    var confirm    = document.getElementById('regConfirm').value;

    /* Front-end validation */
    if (!lastName || !firstName || !patronymic || !birthDate || !email || !pass) {
      showMsg('registerMsg', 'Пожалуйста, заполните все обязательные поля.');
      return;
    }
    if (pass.length < 6) { showMsg('registerMsg', 'Пароль должен содержать минимум 6 символов.'); return; }
    if (pass !== confirm) { showMsg('registerMsg', 'Пароли не совпадают.'); return; }

    var btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'Регистрация...';

    try {
      var res  = await fetch('/api/users/register', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          last_name:  lastName,
          first_name: firstName,
          patronymic: patronymic,
          birth_date: birthDate,
          email:      email,
          password:   pass,
        }),
      });
      var data = await res.json();

      if (data.success) {
        showMsg('registerMsg', 'Аккаунт создан! Перенаправляем...', 'success');
        setTimeout(function () { window.location.href = '/profile/'; }, 600);
      } else {
        showMsg('registerMsg', parseError(data, res.status));
      }
    } catch (_) {
      showMsg('registerMsg', 'Ошибка соединения с сервером. Попробуйте позже.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Создать аккаунт';
    }
  });

}());
</script>
</body>
</html>
