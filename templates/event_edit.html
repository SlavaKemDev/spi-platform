{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактирование события — UniSphere</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}());</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    .edit-wrap { max-width: 760px; margin: 40px auto; padding: 0 24px 60px; }
    .edit-card {
      background: var(--card-bg); border: 1.5px solid var(--border);
      border-radius: 24px; box-shadow: var(--shadow); padding: 36px 40px 40px;
      transition: background .25s, border-color .25s;
    }
    .edit-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: var(--text); }
    .edit-form { display: flex; flex-direction: column; gap: 16px; }
    .edit-field { display: flex; flex-direction: column; gap: 5px; }
    .edit-label { font-size: .85rem; font-weight: 600; color: var(--text); }
    .edit-input, .edit-textarea, .edit-select {
      border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px;
      font-size: .92rem; color: var(--text); background: var(--bg); font-family: inherit;
      outline: none; width: 100%; box-sizing: border-box;
      transition: border-color .2s, background .25s, color .25s;
    }
    .edit-input:focus, .edit-textarea:focus, .edit-select:focus { border-color: var(--accent); background: var(--card-bg); }
    .edit-textarea { min-height: 100px; resize: vertical; }
    .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 560px) { .edit-row { grid-template-columns: 1fr; } }

    /* Form type toggle */
    .form-type-toggle {
      display: flex; gap: 0; border: 1.5px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 4px;
    }
    .form-type-btn {
      flex: 1; padding: 10px 16px; border: none; background: var(--bg);
      color: var(--muted); font-size: .88rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .2s, color .2s;
    }
    .form-type-btn.active {
      background: var(--accent); color: #fff;
    }

    /* Profile field toggles */
    .profile-field-toggle {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
    }
    .profile-field-toggle label {
      font-size: .88rem; font-weight: 500; color: var(--text); cursor: pointer;
      display: flex; align-items: center; gap: 6px; flex: 1;
    }
    .profile-field-toggle .toggle-hint {
      font-size: .78rem; color: var(--muted); margin-left: auto;
    }
    .toggle-switch {
      position: relative; width: 40px; height: 22px; flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: var(--border); border-radius: 22px;
      cursor: pointer; transition: background .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; height: 16px; width: 16px;
      left: 3px; bottom: 3px; background: #fff; border-radius: 50%;
      transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* External form section */
    .external-form-section {
      display: flex; flex-direction: column; gap: 10px;
    }
    .external-form-row {
      display: flex; gap: 8px; align-items: center;
    }
    .external-form-row input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 10px 14px; font-size: .92rem; color: var(--text);
      background: var(--bg); font-family: inherit; outline: none;
    }
    .external-form-row input:focus { border-color: var(--accent); }
    .external-form-row button {
      white-space: nowrap; padding: 10px 18px; border-radius: 8px;
      background: var(--accent); color: #fff; border: none; font-weight: 600;
      font-size: .88rem; cursor: pointer; font-family: inherit;
    }
    .external-status {
      font-size: .85rem; padding: 8px 12px; border-radius: 8px;
    }
    .external-status.ok { background: #d1fae5; color: #065f46; }
    .external-status.err { background: #fee2e2; color: #b91c1c; }
    [data-theme="dark"] .external-status.ok { background: #052e16; color: #34d399; }
    [data-theme="dark"] .external-status.err { background: #3f0f0f; color: #f87171; }

    /* Form fields builder */
    .fields-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .field-item {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
      transition: background .25s, border-color .25s;
    }
    .field-item-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .field-item-row input, .field-item-row select {
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
      font-size: .85rem; color: var(--text); background: var(--card-bg); font-family: inherit;
      outline: none; flex: 1; min-width: 100px;
    }
    .field-item-row input:focus, .field-item-row select:focus { border-color: var(--accent); }
    .field-item-row label { font-size: .82rem; color: var(--muted); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .field-remove {
      background: none; border: none; color: #e57373; cursor: pointer;
      font-size: 1.1rem; padding: 2px 6px; flex-shrink: 0;
    }
    .field-remove:hover { color: #b91c1c; }
    .field-options-input {
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
      font-size: .82rem; color: var(--text); background: var(--card-bg); font-family: inherit;
      outline: none; width: 100%;
    }
    .add-field-btn {
      margin-top: 6px; padding: 8px 16px; background: transparent;
      border: 1.5px dashed var(--border); border-radius: 8px; color: var(--accent);
      font-size: .88rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: border-color .2s, background .2s;
    }
    .add-field-btn:hover { border-color: var(--accent); background: var(--accent-l); }

    .edit-actions { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .edit-msg {
      margin-top: 12px; font-size: .88rem; border-radius: 8px; padding: 10px 14px; display: none;
    }
    .edit-msg.error  { background: #fee2e2; color: #b91c1c; }
    .edit-msg.success { background: #d1fae5; color: #065f46; }
    [data-theme="dark"] .edit-msg.error  { background: #3f0f0f; color: #f87171; }
    [data-theme="dark"] .edit-msg.success { background: #052e16; color: #34d399; }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <a href="/" class="logo">
    <img class="logo-icon" src="{% static 'img/logo.png' %}" alt="UniSphere">
  </a>
  <div class="search-wrap"></div>
  <button class="theme-btn" id="themeToggle" title="Переключить тему">🌙</button>
  <a href="/profile/" class="account-btn" id="accountBtn">?</a>
</header>

<div class="edit-wrap">
  <div class="edit-card">
    <h1 class="edit-title" id="pageTitle">Загрузка...</h1>

    <div class="edit-form" id="editForm">
      <div class="edit-field">
        <label class="edit-label">Название события</label>
        <input class="edit-input" id="fieldTitle" placeholder="Введите название">
      </div>

      <div class="edit-field">
        <label class="edit-label">Описание</label>
        <textarea class="edit-textarea" id="fieldDesc" placeholder="Опишите событие"></textarea>
      </div>

      <div class="edit-row">
        <div class="edit-field">
          <label class="edit-label">Начало регистрации</label>
          <input class="edit-input" type="datetime-local" id="fieldRegStart">
        </div>
        <div class="edit-field">
          <label class="edit-label">Конец регистрации</label>
          <input class="edit-input" type="datetime-local" id="fieldRegEnd">
        </div>
      </div>

      <div class="edit-row">
        <div class="edit-field">
          <label class="edit-label">Начало события</label>
          <input class="edit-input" type="datetime-local" id="fieldEventStart">
        </div>
        <div class="edit-field">
          <label class="edit-label">Конец события</label>
          <input class="edit-input" type="datetime-local" id="fieldEventEnd">
        </div>
      </div>

      <div class="edit-row">
        <div class="edit-field">
          <label class="edit-label">Место проведения</label>
          <input class="edit-input" id="fieldLocation" placeholder="Адрес или ссылка">
        </div>
        <div class="edit-field">
          <label class="edit-label">Формат</label>
          <select class="edit-select" id="fieldFormat">
            <option value="offline">Оффлайн</option>
            <option value="online">Онлайн</option>
          </select>
        </div>
      </div>

      <!-- ── Registration form section ─────────────────── -->
      <div class="edit-field">
        <label class="edit-label">Форма регистрации</label>
        <div class="form-type-toggle" id="formTypeToggle">
          <button type="button" class="form-type-btn active" data-type="internal">Наша форма</button>
          <button type="button" class="form-type-btn" data-type="external">Внешняя ссылка</button>
        </div>
      </div>

      <!-- Internal form section -->
      <div id="internalFormSection">
        <div class="edit-field">
          <label class="edit-label">Данные из личного кабинета</label>
          <div class="fields-list" id="profileFieldsList">
            <div class="profile-field-toggle">
              <label><span class="toggle-switch"><input type="checkbox" checked data-profile="first_name"><span class="toggle-slider"></span></span> Имя</label>
              <span class="toggle-hint">first_name</span>
            </div>
            <div class="profile-field-toggle">
              <label><span class="toggle-switch"><input type="checkbox" checked data-profile="last_name"><span class="toggle-slider"></span></span> Фамилия</label>
              <span class="toggle-hint">last_name</span>
            </div>
            <div class="profile-field-toggle">
              <label><span class="toggle-switch"><input type="checkbox" checked data-profile="email"><span class="toggle-slider"></span></span> Почта</label>
              <span class="toggle-hint">email</span>
            </div>
            <div class="profile-field-toggle">
              <label><span class="toggle-switch"><input type="checkbox" data-profile="patronymic"><span class="toggle-slider"></span></span> Отчество</label>
              <span class="toggle-hint">patronymic</span>
            </div>
            <div class="profile-field-toggle">
              <label><span class="toggle-switch"><input type="checkbox" data-profile="birth_date"><span class="toggle-slider"></span></span> Дата рождения</label>
              <span class="toggle-hint">birth_date</span>
            </div>
          </div>
        </div>
        <div class="edit-field">
          <label class="edit-label" style="margin-top:8px">Дополнительные поля</label>
          <div class="fields-list" id="formFieldsList"></div>
          <button type="button" class="add-field-btn" id="addFieldBtn">+ Добавить поле</button>
        </div>
      </div>

      <!-- External form section -->
      <div id="externalFormSection" style="display:none">
        <div class="edit-field external-form-section">
          <label class="edit-label">Ссылка на внешнюю форму (Google Forms и т.п.)</label>
          <div class="external-form-row">
            <input type="url" id="externalUrl" placeholder="https://docs.google.com/forms/d/...">
            <button type="button" id="attachFormBtn">Привязать</button>
          </div>
          <div id="externalStatus" style="display:none" class="external-status"></div>
        </div>
      </div>

      <div class="edit-actions">
        <button class="btn-register" id="saveBtn">Сохранить</button>
        <button class="btn-register" id="publishBtn" style="background:#16a34a;display:none">Опубликовать</button>
        <a id="backToOrgLink" href="/" class="btn-back">← К организации</a>
      </div>

      <div class="edit-msg" id="editMsg"></div>
    </div>
  </div>
</div>

<script src="{% static 'js/carousel.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script>
(function () {
  var EVENT_ID = {{ event_id }};
  var ORG_ID   = {{ org_id }};

  document.getElementById('backToOrgLink').href = '/organizations/' + ORG_ID + '/';

  var msgEl = document.getElementById('editMsg');
  function showMsg(text, ok) {
    msgEl.textContent = text;
    msgEl.className = 'edit-msg ' + (ok ? 'success' : 'error');
    msgEl.style.display = 'block';
  }

  /* ── Form type toggle ────────────────────────────────── */
  var formType = 'internal'; // 'internal' or 'external'
  var toggleBtns = document.querySelectorAll('.form-type-btn');

  function setFormType(type) {
    formType = type;
    toggleBtns.forEach(function (b) {
      b.classList.toggle('active', b.dataset.type === type);
    });
    document.getElementById('internalFormSection').style.display = type === 'internal' ? '' : 'none';
    document.getElementById('externalFormSection').style.display = type === 'external' ? '' : 'none';
  }

  toggleBtns.forEach(function (b) {
    b.addEventListener('click', function () { setFormType(b.dataset.type); });
  });

  /* ── Profile fields (toggleable) ─────────────────────── */
  var PROFILE_FIELDS = {
    first_name: { label: 'Имя', type: 'text' },
    last_name:  { label: 'Фамилия', type: 'text' },
    email:      { label: 'Почта', type: 'text' },
    patronymic: { label: 'Отчество', type: 'text' },
    birth_date: { label: 'Дата рождения', type: 'text' },
  };

  function getEnabledProfileFields() {
    var fields = [];
    var checkboxes = document.querySelectorAll('[data-profile]');
    checkboxes.forEach(function (cb) {
      if (cb.checked) {
        var name = cb.dataset.profile;
        var pf = PROFILE_FIELDS[name];
        fields.push({ name: name, label: pf.label, type: pf.type, required: true });
      }
    });
    return fields;
  }

  function setProfileFieldState(name, enabled) {
    var cb = document.querySelector('[data-profile="' + name + '"]');
    if (cb) cb.checked = enabled;
  }

  /* ── Custom form fields builder ──────────────────────── */
  var formFields = [];
  var listEl = document.getElementById('formFieldsList');

  function renderFields() {
    listEl.innerHTML = '';
    formFields.forEach(function (f, i) {
      var item = document.createElement('div');
      item.className = 'field-item';
      var showOptions = f.type === 'select';
      item.innerHTML =
        '<div class="field-item-row">' +
          '<input type="hidden" value="' + esc(f.name) + '" data-i="' + i + '" data-key="name">' +
          '<input placeholder="Название поля" value="' + esc(f.label) + '" data-i="' + i + '" data-key="label">' +
          '<select data-i="' + i + '" data-key="type">' +
            '<option value="text"'     + (f.type==='text'     ? ' selected':'') + '>Текст</option>' +
            '<option value="textarea"' + (f.type==='textarea' ? ' selected':'') + '>Текстовое поле</option>' +
            '<option value="number"'   + (f.type==='number'   ? ' selected':'') + '>Число</option>' +
            '<option value="select"'   + (f.type==='select'   ? ' selected':'') + '>Выбор</option>' +
            '<option value="checkbox"' + (f.type==='checkbox' ? ' selected':'') + '>Чекбокс</option>' +
          '</select>' +
          '<label><input type="checkbox" data-i="' + i + '" data-key="required"' + (f.required ? ' checked':'') + '> Обяз.</label>' +
          '<button class="field-remove" data-i="' + i + '">✕</button>' +
        '</div>' +
        (showOptions ? '<input class="field-options-input" placeholder="Варианты через запятую" value="' + esc((f.options||[]).join(', ')) + '" data-i="' + i + '" data-key="options">' : '');
      listEl.appendChild(item);
    });
  }

  function esc(s) { return String(s||'').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

  listEl.addEventListener('input', function (e) {
    var el = e.target;
    var i = parseInt(el.dataset.i); var key = el.dataset.key;
    if (isNaN(i) || !key) return;
    if (key === 'required') formFields[i].required = el.checked;
    else if (key === 'options') formFields[i].options = el.value.split(',').map(function(s){return s.trim();}).filter(Boolean);
    else formFields[i][key] = el.value;
    if (key === 'type') renderFields();
  });
  listEl.addEventListener('change', function (e) {
    var el = e.target;
    var i = parseInt(el.dataset.i); var key = el.dataset.key;
    if (isNaN(i) || !key) return;
    if (key === 'required') formFields[i].required = el.checked;
    else if (key === 'type') { formFields[i].type = el.value; renderFields(); }
  });
  listEl.addEventListener('click', function (e) {
    if (e.target.classList.contains('field-remove')) {
      formFields.splice(parseInt(e.target.dataset.i), 1);
      renderFields();
    }
  });

  function genId() { return 'field_' + Math.random().toString(36).slice(2, 8); }

  document.getElementById('addFieldBtn').addEventListener('click', function () {
    formFields.push({ name: genId(), label: '', type: 'text', required: false });
    renderFields();
  });

  /* ── External form attach ────────────────────────────── */
  var externalAttached = false;

  document.getElementById('attachFormBtn').addEventListener('click', function () {
    var url = document.getElementById('externalUrl').value.trim();
    var statusEl = document.getElementById('externalStatus');
    if (!url) {
      statusEl.className = 'external-status err';
      statusEl.textContent = 'Введите ссылку на форму.';
      statusEl.style.display = 'block';
      return;
    }
    var btn = this;
    btn.disabled = true; btn.textContent = 'Привязка...';
    statusEl.style.display = 'none';

    UniSphereAuth.post('/api/events/' + EVENT_ID + '/attach-external-form', { url: url })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.message) {
          externalAttached = true;
          statusEl.className = 'external-status ok';
          var text = 'Форма привязана!';
          if (data.manual_fields && data.manual_fields.length > 0) {
            text += ' Поля, требующие ручного заполнения: ' + data.manual_fields.join(', ');
          }
          statusEl.textContent = text;
        } else {
          statusEl.className = 'external-status err';
          statusEl.textContent = data.error || 'Ошибка привязки.';
        }
        statusEl.style.display = 'block';
      })
      .catch(function () {
        statusEl.className = 'external-status err';
        statusEl.textContent = 'Ошибка соединения.';
        statusEl.style.display = 'block';
      })
      .finally(function () { btn.disabled = false; btn.textContent = 'Привязать'; });
  });

  /* ── Load event data ─────────────────────────────────── */
  function isoToLocal(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
      'T' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  function localToApi(val) {
    if (!val) return '';
    return val.length === 16 ? val + ':00' : val;
  }

  var isPublished = false;
  var isExternal = false;

  fetch('/api/events/' + EVENT_ID)
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (data) {
      if (data.error) { showMsg(data.error, false); return; }

      isPublished = !!data.is_published;
      isExternal = !!data.is_external;

      document.getElementById('pageTitle').textContent =
        isPublished ? 'Просмотр события' : 'Редактирование события';

      document.getElementById('fieldTitle').value    = data.title || '';
      document.getElementById('fieldDesc').value     = data.description || '';
      document.getElementById('fieldRegStart').value  = isoToLocal(data.registration_start);
      document.getElementById('fieldRegEnd').value    = isoToLocal(data.registration_end);
      document.getElementById('fieldEventStart').value = isoToLocal(data.event_start);
      document.getElementById('fieldEventEnd').value   = isoToLocal(data.event_end);
      document.getElementById('fieldLocation').value = data.location || '';
      document.getElementById('fieldFormat').value   = data.format || 'offline';

      if (isExternal) {
        setFormType('external');
        externalAttached = true;
        var statusEl = document.getElementById('externalStatus');
        statusEl.className = 'external-status ok';
        statusEl.textContent = 'Внешняя форма привязана.';
        statusEl.style.display = 'block';
      } else {
        setFormType('internal');
        // Parse existing form fields — separate profile fields from custom fields
        var allFields = Array.isArray(data.form) ? data.form : [];
        var PROFILE_NAMES = { first_name:1, last_name:1, email:1, patronymic:1, birth_date:1 };

        // Turn off all profile toggles first, then enable only those present
        Object.keys(PROFILE_FIELDS).forEach(function (k) { setProfileFieldState(k, false); });
        allFields.forEach(function (f) {
          if (PROFILE_NAMES[f.name]) setProfileFieldState(f.name, true);
        });

        formFields = allFields.filter(function (f) { return !PROFILE_NAMES[f.name]; });
        renderFields();
      }

      if (isPublished) {
        document.getElementById('saveBtn').style.display = 'none';
        document.getElementById('publishBtn').style.display = 'none';
        document.getElementById('formTypeToggle').style.pointerEvents = 'none';
        document.getElementById('formTypeToggle').style.opacity = '.6';
        var inputs = document.querySelectorAll('.edit-input, .edit-textarea, .edit-select');
        for (var k = 0; k < inputs.length; k++) inputs[k].disabled = true;
        document.getElementById('addFieldBtn').style.display = 'none';
        document.getElementById('attachFormBtn').disabled = true;
        // Disable profile toggles
        var toggles = document.querySelectorAll('[data-profile]');
        for (var j = 0; j < toggles.length; j++) toggles[j].disabled = true;
      } else {
        document.getElementById('publishBtn').style.display = 'inline-block';
      }
    })
    .catch(function () { showMsg('Не удалось загрузить событие.', false); });

  /* ── Collect form data ───────────────────────────────── */
  function collectPayload() {
    var payload = {
      title:              document.getElementById('fieldTitle').value.trim(),
      description:        document.getElementById('fieldDesc').value.trim(),
      registration_start: localToApi(document.getElementById('fieldRegStart').value),
      registration_end:   localToApi(document.getElementById('fieldRegEnd').value),
      event_start:        localToApi(document.getElementById('fieldEventStart').value),
      event_end:          localToApi(document.getElementById('fieldEventEnd').value),
      location:           document.getElementById('fieldLocation').value.trim(),
      format:             document.getElementById('fieldFormat').value,
    };

    if (formType === 'internal') {
      var profileFields = getEnabledProfileFields();
      var customFields = formFields.filter(function(f) { return f.name && f.label; });
      payload.form = profileFields.concat(customFields);
    }
    // If external, form is null (handled by backend)

    return payload;
  }

  /* ── Validate ──────────────────────────────────────── */
  function validate() {
    var p = collectPayload();
    if (!p.title) { showMsg('Введите название события.', false); return false; }
    if (!p.event_start) { showMsg('Укажите начало события.', false); return false; }
    if (p.event_end && p.event_end < p.event_start) { showMsg('Конец события раньше начала.', false); return false; }
    if (p.registration_end && p.registration_start && p.registration_end < p.registration_start) { showMsg('Конец регистрации раньше начала.', false); return false; }
    return true;
  }

  /* ── Save ───────────────────────────────────────────── */
  document.getElementById('saveBtn').addEventListener('click', function () {
    if (!validate()) return;
    var btn = this;
    btn.disabled = true; btn.textContent = 'Сохранение...';
    msgEl.style.display = 'none';

    UniSphereAuth.post('/api/events/' + EVENT_ID + '/update', collectPayload())
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.event_id || data.message) {
          showMsg('Сохранено!', true);
        } else {
          showMsg(data.error || 'Ошибка сохранения.', false);
        }
      })
      .catch(function () { showMsg('Ошибка соединения.', false); })
      .finally(function () { btn.disabled = false; btn.textContent = 'Сохранить'; });
  });

  /* ── Publish ──────────────────────────────────────── */
  document.getElementById('publishBtn').addEventListener('click', function () {
    if (!validate()) return;

    if (formType === 'external' && !externalAttached) {
      showMsg('Сначала привяжите внешнюю форму.', false);
      return;
    }

    var btn = this;
    btn.disabled = true; btn.textContent = 'Публикация...';
    msgEl.style.display = 'none';

    UniSphereAuth.post('/api/events/' + EVENT_ID + '/update', collectPayload())
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) { showMsg(data.error, false); btn.disabled = false; btn.textContent = 'Опубликовать'; return Promise.reject(); }
        return UniSphereAuth.post('/api/events/' + EVENT_ID + '/publish', {});
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.event_id || data.message) {
          showMsg('Событие опубликовано!', true);
          setTimeout(function () {
            window.location.href = '/events/' + EVENT_ID + '/';
          }, 1000);
        } else {
          showMsg(data.error || 'Ошибка публикации.', false);
          btn.disabled = false; btn.textContent = 'Опубликовать';
        }
      })
      .catch(function () { btn.disabled = false; btn.textContent = 'Опубликовать'; });
  });

}());
</script>
</body>
</html>
