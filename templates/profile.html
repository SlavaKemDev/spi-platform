{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — UniSphere</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}());</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="header">
  <a href="/" class="logo">
    <img class="logo-icon" src="{% static 'img/logo.png' %}" alt="UniSphere">
  </a>
  <a href="/swipe/" class="swipe-banner" title="Свайп-режим">Посвайпаем?</a>
  <button class="theme-btn" id="themeToggle" title="Переключить тему">🌙</button>
  <!-- Account button: already on profile, shows initials -->
  <a href="/profile/" class="account-btn" id="accountBtn">?</a>
</header>

<!-- ── Loading state ──────────────────────────────────── -->
<div id="profileLoading" class="profile-loading">Загрузка...</div>

<!-- ── Profile ────────────────────────────────────────── -->
<div class="profile-wrap" id="profileWrap" style="display:none">

  <!-- Hero card -->
  <div class="profile-hero">
    <div class="profile-hero-banner"></div>
    <div class="profile-hero-body">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-info">
        <h1 class="profile-name" id="profileName">Загрузка...</h1>
        <p class="profile-email-text" id="profileEmail"></p>
      </div>
      <div class="profile-actions">
        <a href="/" class="btn-back">← На главную</a>
        <button class="profile-logout-btn" id="logoutBtn">Выйти</button>
      </div>
    </div>
  </div>

  <!-- Events -->
  <div class="profile-grid">

    <!-- My events -->
    <div class="profile-card">
      <h2 class="profile-card-title">📅 Мои события</h2>
      <div id="myEventsList"><p style="color:var(--muted);font-size:.88rem">Загрузка...</p></div>
      <a href="/" class="profile-browse-link">Найти новые события →</a>
    </div>

    <!-- My organizations -->
    <div class="profile-card">
      <h2 class="profile-card-title">🏢 Мои организации</h2>
      <div id="myOrgsList"><p style="color:var(--muted);font-size:.88rem">Загрузка...</p></div>
    </div>

  </div><!-- .profile-grid -->

  <!-- Settings -->
  <div class="profile-card">
    <h2 class="profile-card-title">⚙️ Настройки профиля</h2>
    <div class="profile-settings-grid">
      <div class="profile-field">
        <label class="profile-field-label">Имя</label>
        <input type="text" id="settingFirstName" class="profile-input" placeholder="Ваше имя">
      </div>
      <div class="profile-field">
        <label class="profile-field-label">Фамилия</label>
        <input type="text" id="settingLastName" class="profile-input" placeholder="Ваша фамилия">
      </div>
      <div class="profile-field">
        <label class="profile-field-label">Отчество</label>
        <input type="text" id="settingPatronymic" class="profile-input" placeholder="Ваше отчество">
      </div>
      <div class="profile-field">
        <label class="profile-field-label">Email</label>
        <input type="email" id="settingEmail" class="profile-input" disabled>
      </div>
      <div class="profile-field">
        <label class="profile-field-label">Дата рождения</label>
        <input type="date" id="settingBirthDate" class="profile-input">
      </div>
      <div class="profile-field">
        <label class="profile-field-label">ВУЗ</label>
        <input type="text" id="settingUniversity" class="profile-input" placeholder="Название университета">
      </div>
      <div class="profile-field">
        <label class="profile-field-label">Факультет</label>
        <input type="text" id="settingFaculty" class="profile-input" placeholder="Ваш факультет">
      </div>
      <div class="profile-field">
        <label class="profile-field-label">Курс</label>
        <input type="text" id="settingCourse" class="profile-input" placeholder="Например: 3">
      </div>
    </div>
    <div class="profile-settings-footer">
      <button class="card-btn" id="saveSettingsBtn">Сохранить изменения</button>
      <p class="profile-settings-note" id="settingsNote" style="display:none"></p>
    </div>
  </div>

</div><!-- .profile-wrap -->

<script src="{% static 'js/carousel.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {

  var STATUS_LABELS = {
    'pending':  '<span class="status-pending">На рассмотрении</span>',
    'approved': '<span class="status-registered">Подтверждён</span>',
    'rejected': '<span class="status-rejected">Отклонён</span>',
  };

  /* ── Logout ───────────────────────────────────────────── */
  document.getElementById('logoutBtn').addEventListener('click', function () {
    UniSphereAuth.post('/api/users/logout', {})
      .finally(function () { window.location.href = '/'; });
  });

  /* ── Save settings ────────────────────────────────────── */
  document.getElementById('saveSettingsBtn').addEventListener('click', function () {
    var btn  = this;
    var note = document.getElementById('settingsNote');
    var payload = {
      first_name:  document.getElementById('settingFirstName').value.trim(),
      last_name:   document.getElementById('settingLastName').value.trim(),
      patronymic:  document.getElementById('settingPatronymic').value.trim(),
      birth_date:  document.getElementById('settingBirthDate').value || '',
      university:  document.getElementById('settingUniversity').value.trim(),
      faculty:     document.getElementById('settingFaculty').value.trim(),
      course:      document.getElementById('settingCourse').value.trim(),
    };

    btn.disabled = true;
    UniSphereAuth.post('/api/users/me/update', payload)
      .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function () {
        return fetch('/api/users/me').then(function (r) { return r.json(); });
      })
      .then(function (user) {
        if (user && user.id) renderProfile(user);
        showNote(note, 'Изменения сохранены', false);
      })
      .catch(function () {
        showNote(note, 'Не удалось сохранить изменения', true);
      })
      .finally(function () {
        btn.disabled = false;
        setTimeout(function () { note.style.display = 'none'; }, 3000);
      });
  });

  function showNote(el, text, isError) {
    el.textContent = text;
    el.style.color = isError ? 'var(--error, #b91c1c)' : 'var(--muted)';
    el.style.display = 'block';
  }

  /* ── Load registrations ───────────────────────────────── */
  function loadRegistrations() {
    var list = document.getElementById('myEventsList');
    fetch('/api/events/registrations')
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) {
        if (!Array.isArray(data) || data.length === 0) {
          list.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Вы пока не зарегистрированы ни на одно событие.</p>';
          return;
        }
        list.innerHTML = data.map(function (reg) {
          var statusHtml = STATUS_LABELS[reg.status] || '<span class="status-pending">' + (reg.status || '') + '</span>';
          var date = reg.registered_at ? new Date(reg.registered_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
          return '<div class="profile-event-item">'
            + '<span class="profile-event-emoji">📅</span>'
            + '<div>'
            + '<a href="/events/' + reg.id + '/" class="profile-event-link">' + escHtml(reg.title) + '</a>'
            + '<div class="profile-event-meta">' + (date ? date + ' &middot; ' : '') + statusHtml + '</div>'
            + '</div></div>';
        }).join('');
      })
      .catch(function () {
        list.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Не удалось загрузить события.</p>';
      });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Load organizations ──────────────────────────────── */
  function loadOrganizations() {
    var list = document.getElementById('myOrgsList');
    fetch('/api/organizations/my')
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) {
        if (!Array.isArray(data) || data.length === 0) {
          list.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Вы не состоите ни в одной организации.</p>';
          return;
        }
        list.innerHTML = data.map(function (org) {
          var role = org.is_admin ? 'Администратор' : 'Участник';
          return '<div class="profile-event-item">'
            + '<span class="profile-event-emoji">🏢</span>'
            + '<div>'
            + '<a href="/organizations/' + org.id + '/" class="profile-event-link">' + escHtml(org.name) + '</a>'
            + '<div class="profile-event-meta">' + role + '</div>'
            + '</div></div>';
        }).join('');
      })
      .catch(function () {
        list.innerHTML = '<p style="color:var(--muted);font-size:.88rem">Не удалось загрузить организации.</p>';
      });
  }

  /* ── Render profile from user object ──────────────────── */
  function renderProfile(user) {
    document.getElementById('profileLoading').style.display = 'none';
    document.getElementById('profileWrap').style.display  = 'flex';

    var fn   = user.first_name || '';
    var ln   = user.last_name  || '';
    var name = [fn, ln].filter(Boolean).join(' ') || user.email || 'Пользователь';
    var ini  = UniSphereAuth.initials(user);

    document.getElementById('profileAvatar').textContent = ini;
    document.getElementById('profileName').textContent   = name;
    document.getElementById('profileEmail').textContent  = user.email || '';
    document.getElementById('accountBtn').textContent    = ini;
    document.getElementById('settingFirstName').value    = fn;
    document.getElementById('settingLastName').value     = ln;
    document.getElementById('settingPatronymic').value   = user.patronymic || '';
    document.getElementById('settingEmail').value        = user.email || '';
    document.getElementById('settingBirthDate').value    = user.birth_date || '';
    document.getElementById('settingUniversity').value   = user.university || '';
    document.getElementById('settingFaculty').value      = user.faculty || '';
    document.getElementById('settingCourse').value       = user.course || '';
  }

  /* ── Auth check ───────────────────────────────────────── */
  fetch('/api/users/me')
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (d) {
      if (d && d.id) {
        renderProfile(d);
        loadRegistrations();
        loadOrganizations();
      } else {
        window.location.href = '/auth/';
      }
    })
    .catch(function () { window.location.href = '/auth/'; });

});
</script>
</body>
</html>
